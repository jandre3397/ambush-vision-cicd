version: "3.9"

services:
  db:
    image: postgres:15
    container_name: ambushvision-db
    environment:
      POSTGRES_DB: ambushvision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: ambushvision-backend
    ports:
      - "5001:5000"
    environment:
      DB_HOST: db
      DB_NAME: ambushvision
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: ambushvision-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: